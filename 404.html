<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>قسورة Qswra</title>
    <script>
      // GitHub Pages SPA redirect
      // Saves the full URL to sessionStorage and redirects to the root
      // so React Router can handle the route on load.
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?p=1'
      );
    </script>
  </head>
  <body></body>
</html>
